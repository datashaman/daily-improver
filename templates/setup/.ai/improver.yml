version: 1
schedule:
  timezone: Africa/Johannesburg
  time: "05:00"
selection:
  priorities: [correctness, static-analysis, mutation-survivors, maintainability]
limits:
  max_changed_files: 5
  max_diff_lines: 250
  max_open_prs: 3
  max_cost_usd: 5
protected_paths: [.github/**, infrastructure/**, database/migrations/**, tests/Property/**, .ai/runs/**/spec.json, .ai/policies/**]
verification:
  commands:
    - composer validate
    - vendor/bin/pint --test
    - vendor/bin/phpstan analyse
    - vendor/bin/phpunit
  mutation_testing: targeted
pull_request:
  draft: true
  labels: [ai-improvement]
